<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>射击升级 - 武器大师</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a12; overflow:hidden; font-family:'PingFang SC','Microsoft YaHei',sans-serif; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; touch-action:none; }
canvas { display:block; position:absolute; top:0; left:0; }

#topBar { position:absolute; top:8px; left:8px; right:8px; display:flex; justify-content:space-between; align-items:center; pointer-events:none; z-index:10; }
.stat { color:#fff; font-size:13px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; text-shadow:0 0 6px rgba(0,0,0,0.8); }
.gold-text { color:#ffd700; }

#bottomBar { position:absolute; bottom:0; left:0; right:0; display:flex; gap:6px; padding:8px 8px 24px 8px; pointer-events:auto; z-index:10; overflow-x:auto; -webkit-overflow-scrolling:touch; background:linear-gradient(transparent, rgba(0,0,0,0.8) 30%); justify-content:center; }
.upgrade-btn { flex-shrink:0; min-width:64px; padding:8px 10px; border-radius:10px; border:2px solid #555; background:rgba(20,20,40,0.9); color:#aaa; font-size:11px; cursor:pointer; text-align:center; transition:all 0.15s; white-space:nowrap; }
.upgrade-btn.affordable { border-color:#ffd700; color:#ffd700; background:rgba(40,30,10,0.9); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{border-color:#ffd700}50%{border-color:#fff} }
.upgrade-btn.owned { border-color:#4caf50; color:#4caf50; background:rgba(10,30,10,0.9); }
.upgrade-btn.equipped { border-color:#4fc3f7; color:#4fc3f7; background:rgba(10,20,30,0.9); box-shadow:0 0 12px rgba(79,195,247,0.4); }
.upgrade-btn:active { transform:scale(0.95); }
.upgrade-btn .icon { font-size:18px; display:block; margin-bottom:2px; }
.upgrade-btn .name { font-weight:bold; font-size:11px; }
.upgrade-btn .cost { font-size:10px; margin-top:1px; opacity:0.7; }

#gameOver { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:auto; z-index:20; display:none; }
#gameOver h1 { color:#ff4444; font-size:32px; text-shadow:0 0 20px rgba(255,0,0,0.5); margin-bottom:8px; }
#gameOver .stats { color:#ccc; font-size:14px; margin:3px 0; }
#gameOver button { margin:6px 4px; padding:10px 24px; font-size:14px; background:#4fc3f7; color:#000; border:none; border-radius:8px; cursor:pointer; font-weight:bold; transition:all 0.2s; }
#gameOver button.secondary { background:rgba(255,255,255,0.15); color:#fff; }

#msgBox { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:15; color:#ffd700; font-size:24px; font-weight:bold; text-shadow:0 0 15px rgba(255,215,0,0.6); opacity:0; transition:opacity 0.3s; }

#loginScreen { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(5,5,15,0.95); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; }
#loginScreen h1 { color:#4fc3f7; font-size:28px; margin-bottom:4px; }
#loginScreen .sub { color:#888; font-size:13px; margin-bottom:24px; }
#loginScreen input { width:260px; padding:12px 16px; margin:6px 0; border-radius:8px; border:2px solid #333; background:rgba(255,255,255,0.05); color:#fff; font-size:15px; outline:none; transition:border 0.2s; }
#loginScreen input:focus { border-color:#4fc3f7; }
#loginScreen .btn-row { display:flex; gap:8px; margin-top:12px; }
#loginScreen button { padding:12px 32px; border-radius:8px; border:none; font-size:15px; cursor:pointer; font-weight:bold; transition:all 0.2s; }
#loginScreen .btn-primary { background:#4fc3f7; color:#000; }
#loginScreen .btn-secondary { background:rgba(255,255,255,0.1); color:#fff; }
#loginScreen .error { color:#ff4444; font-size:13px; margin-top:8px; min-height:20px; }
#loginScreen .profile-hint { color:#666; font-size:12px; margin-top:16px; text-align:center; line-height:1.6; }

#saveIndicator { position:absolute; top:50px; right:12px; color:rgba(255,255,255,0.4); font-size:11px; pointer-events:none; z-index:10; opacity:0; transition:opacity 0.5s; }
#logoutBtn { position:absolute; top:8px; right:8px; color:rgba(255,255,255,0.3); font-size:11px; pointer-events:auto; z-index:12; cursor:pointer; background:rgba(0,0,0,0.4); padding:2px 8px; border-radius:4px; border:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="topBar"></div>
<div id="bottomBar"></div>
<div id="msgBox"></div>
<div id="saveIndicator">💾 已保存</div>
<button id="logoutBtn" style="display:none" onclick="logout()">🚪 退出</button>

<div id="loginScreen">
  <h1>🔫 武器大师</h1>
  <div class="sub">射击升级 · 登录存档</div>
  <input type="text" id="loginUser" placeholder="用户名" maxlength="20" autocomplete="off">
  <input type="password" id="loginPass" placeholder="密码" maxlength="30">
  <div class="error" id="loginError"></div>
  <div class="btn-row">
    <button class="btn-primary" onclick="doLogin()">登录</button>
    <button class="btn-secondary" onclick="doRegister()">注册</button>
  </div>
  <div class="profile-hint">注册后你的进度会自动保存<br>换设备也能用同一账号登录</div>
</div>

<div id="gameOver">
  <h1>💀 游戏结束</h1>
  <div class="stats" id="goKills"></div>
  <div class="stats" id="goGold"></div>
  <div class="stats" id="goWave"></div>
  <div class="stats" id="goWeapon"></div>
  <button onclick="restartGame()">🔄 再来一局</button>
</div>

<script>
// ==================== AUTH SYSTEM ====================
let currentUser = null;
const AUTH_PREFIX = 'shooting_user_';

function hashPass(pass) {
  // Simple hash for local storage (not for real security, just obfuscation)
  let h = 0;
  for(let i=0;i<pass.length;i++){ h = ((h<<5)-h)+pass.charCodeAt(i); h|=0; }
  return 'h'+Math.abs(h).toString(36);
}

function getUsers() {
  try { return JSON.parse(localStorage.getItem('shooting_users')||'{}'); } catch(e) { return {}; }
}

function saveUsers(users) {
  localStorage.setItem('shooting_users', JSON.stringify(users));
}

function doRegister() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if(!user || user.length<2){ errEl.textContent='用户名至少2个字符'; return; }
  if(!pass || pass.length<4){ errEl.textContent='密码至少4个字符'; return; }
  const users = getUsers();
  if(users[user]){ errEl.textContent='用户名已存在'; return; }
  users[user] = { pass: hashPass(pass), created: Date.now() };
  saveUsers(users);
  errEl.textContent = '';
  loginSuccess(user);
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if(!user || !pass){ errEl.textContent='请输入用户名和密码'; return; }
  const users = getUsers();
  if(!users[user]){ errEl.textContent='用户不存在，请先注册'; return; }
  if(users[user].pass !== hashPass(pass)){ errEl.textContent='密码错误'; return; }
  errEl.textContent = '';
  loginSuccess(user);
}

function loginSuccess(user) {
  currentUser = user;
  localStorage.setItem('shooting_last_user', user);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'block';
  showMsg('👋 欢迎，'+user+'！');
  loadOrStart();
}

// ==================== CANVAS ====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const topBar = document.getElementById('topBar');
const bottomBar = document.getElementById('bottomBar');
const msgBox = document.getElementById('msgBox');
const goDiv = document.getElementById('gameOver');
const saveInd = document.getElementById('saveIndicator');
let W, H;

function resize() { W=innerWidth; H=innerHeight; canvas.width=W; canvas.height=H; }
resize();
window.addEventListener('resize', resize);

// Try auto-login (moved AFTER element initialization)
(function(){
  const lastUser = localStorage.getItem('shooting_last_user');
  if(lastUser){
    const users = getUsers();
    if(users[lastUser]){
      loginSuccess(lastUser);
      return;
    }
  }
  // Show login screen
  document.getElementById('loginScreen').style.display = 'flex';
  // Press Enter to login
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if(e.key==='Enter') doLogin();
  });
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if(e.key==='Enter') document.getElementById('loginPass').focus();
  });
})();

// ==================== INPUT ====================
const keys = {};
const mouse = { x: W/2, y: H/2, down: false };
const isMobile = /Mobi|Android/i.test(navigator.userAgent);
let mobileMove = { active: false, x: 0, y: 0 };
let mobileShoot = { active: false, x: 0, y: 0 };

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if(e.key==='u'||e.key==='U') toggleStatsPanel();
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()]=false; e.preventDefault(); });

canvas.addEventListener('mousemove', e => {
  mouse.x=e.clientX; mouse.y=e.clientY;
  if(isMobile){ if(e.clientX<W/2){ mobileMove.x=e.clientX; mobileMove.y=e.clientY; } else { mobileShoot.x=e.clientX; mobileShoot.y=e.clientY; } }
});
canvas.addEventListener('mousedown', e => {
  if(isMobile){ if(e.clientX<W/2){ mobileMove.active=true; mobileMove.x=e.clientX; mobileMove.y=e.clientY; } else { mobileShoot.active=true; mobileShoot.x=e.clientX; mobileShoot.y=e.clientY; } }
  else mouse.down=true;
});
canvas.addEventListener('mouseup', e => {
  if(isMobile){ if(e.clientX<W/2) mobileMove.active=false; else mobileShoot.active=false; }
  else mouse.down=false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for(const t of e.changedTouches){ if(t.clientX<W/2){ mobileMove.active=true; mobileMove.x=t.clientX; mobileMove.y=t.clientY; } else { mobileShoot.active=true; mobileShoot.x=t.clientX; mobileShoot.y=t.clientY; } }
},{passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches){ if(t.clientX<W/2){ mobileMove.x=t.clientX; mobileMove.y=t.clientY; } else { mobileShoot.x=t.clientX; mobileShoot.y=t.clientY; } }
},{passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  let la=false, ra=false;
  for(const t of e.touches){ if(t.clientX<W/2) la=true; else ra=true; }
  mobileMove.active=la; mobileShoot.active=ra; mouse.down=false;
},{passive:false});
canvas.addEventListener('touchcancel', () => { mobileMove.active=false; mobileShoot.active=false; mouse.down=false; });

// ==================== PARTICLES ====================
class Particle {
  constructor(x,y,vx,vy,color,life,size=3){ this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;this.life=life;this.maxLife=life;this.size=size; }
  update(dt){ this.x+=this.vx*dt;this.y+=this.vy*dt;this.life-=dt;this.vx*=0.97;this.vy*=0.97; }
  draw(ctx){ const a=Math.max(0,this.life/this.maxLife); ctx.save();ctx.globalAlpha=a;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size*a,0,Math.PI*2);ctx.fill();ctx.restore(); }
  get dead(){ return this.life<=0; }
}
class FloatingText {
  constructor(x,y,text,color,size=14){ this.x=x;this.y=y;this.text=text;this.color=color;this.life=1;this.vy=-50;this.size=size; }
  update(dt){ this.y+=this.vy*dt;this.life-=dt*0.7; }
  draw(ctx){ ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;ctx.font=`bold ${this.size}px "PingFang SC","Microsoft YaHei",sans-serif`;ctx.textAlign='center';ctx.fillText(this.text,this.x,this.y);ctx.restore(); }
  get dead(){ return this.life<=0; }
}

// ==================== WEAPONS ====================
const WEAPONS = [
  { id:'pistol', name:'手枪', icon:'🔫', cost:0, damage:8, fireRate:2.5, bulletSpeed:500, bullets:1, spread:0.06, color:'#ffeb3b', size:3, pierce:0, explosive:false, desc:'基础武器',
    barrelLen:12, barrelW:3, muzzle:'#ffeb3b', shape:'round', trailLen:5, trailColor:'#ffd54f', recoil:1 },
  { id:'smg', name:'冲锋枪', icon:'💥', cost:50, damage:6, fireRate:6, bulletSpeed:550, bullets:1, spread:0.1, color:'#ff9800', size:2.5, pierce:0.1, explosive:false, desc:'高速连射',
    barrelLen:16, barrelW:4, muzzle:'#ff9800', shape:'round', trailLen:3, trailColor:'#ffb74d', recoil:3 },
  { id:'shotgun', name:'霰弹枪', icon:'🔥', cost:120, damage:5, fireRate:1.5, bulletSpeed:400, bullets:5, spread:0.35, color:'#f44336', size:2.5, pierce:0, explosive:false, desc:'扇形散射',
    barrelLen:20, barrelW:6, muzzle:'#ff5722', shape:'pellet', trailLen:4, trailColor:'#ef9a9a', recoil:6 },
  { id:'rifle', name:'步枪', icon:'🎯', cost:300, damage:15, fireRate:4, bulletSpeed:700, bullets:1, spread:0.03, color:'#4fc3f7', size:3.5, pierce:0.5, explosive:false, desc:'精准穿透',
    barrelLen:22, barrelW:3.5, muzzle:'#4fc3f7', shape:'spike', trailLen:10, trailColor:'#81d4fa', recoil:2 },
  { id:'laser', name:'激光枪', icon:'⚡', cost:600, damage:3, fireRate:20, bulletSpeed:900, bullets:1, spread:0.02, color:'#00e5ff', size:2, pierce:1, explosive:false, desc:'持续光束',
    barrelLen:14, barrelW:2, muzzle:'#00e5ff', shape:'beam', trailLen:20, trailColor:'#00e5ff', recoil:0.5 },
  { id:'rocket', name:'火箭炮', icon:'🚀', cost:1500, damage:40, fireRate:1, bulletSpeed:300, bullets:1, spread:0.05, color:'#ff6d00', size:8, pierce:0, explosive:true, explRadius:100, explDmg:30, desc:'范围爆炸',
    barrelLen:26, barrelW:8, muzzle:'#ff6d00', shape:'rocket', trailLen:15, trailColor:'#ffab40', recoil:10 },
];

// ==================== BULLET ====================
class Bullet {
  constructor(x,y,angle,weapon){
    this.x=x;this.y=y;this.vx=Math.cos(angle)*weapon.bulletSpeed;this.vy=Math.sin(angle)*weapon.bulletSpeed;
    this.damage=weapon.damage;this.color=weapon.color;this.size=weapon.size;
    this.pierce=Math.random()<weapon.pierce;this.explosive=weapon.explosive;
    this.explRadius=weapon.explRadius||0;this.explDmg=weapon.explDmg||0;
    this.trail=[];this.life=3;this.angle=angle;
    this.shape=weapon.shape||'round';this.trailLen=weapon.trailLen||8;
    this.trailColor=weapon.trailColor||weapon.color;
  }
  update(dt){
    this.trail.push({x:this.x,y:this.y});
    while(this.trail.length>this.trailLen)this.trail.shift();
    this.x+=this.vx*dt;this.y+=this.vy*dt;this.life-=dt;
  }
  draw(ctx){
    const w=this;
    // Trail
    for(let i=0;i<w.trail.length;i++){
      const t=w.trail[i],alpha=(i/w.trail.length)*0.5;
      ctx.save();ctx.globalAlpha=alpha;
      if(w.shape==='beam'){
        // Laser: fading line
        ctx.strokeStyle=w.trailColor;ctx.lineWidth=w.size*(1+i/w.trail.length);ctx.lineCap='round';
        if(i>0){ctx.beginPath();ctx.moveTo(w.trail[i-1].x,w.trail[i-1].y);ctx.lineTo(t.x,t.y);ctx.stroke();}
      } else if(w.shape==='rocket'){
        // Rocket: smoke trail
        ctx.fillStyle=`rgba(255,150,50,${alpha})`;ctx.beginPath();ctx.arc(t.x,t.y,w.size*0.4,0,Math.PI*2);ctx.fill();
      } else {
        ctx.fillStyle=w.trailColor;ctx.beginPath();ctx.arc(t.x,t.y,w.size*0.6+i*0.3,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }

    ctx.save();
    if(w.shape==='beam'){
      // Laser: bright glowing line from recent trail to current position
      ctx.shadowColor=w.color;ctx.shadowBlur=10;
      ctx.strokeStyle='#fff';ctx.lineWidth=w.size*1.5;ctx.lineCap='round';
      ctx.beginPath();
      if(w.trail.length>1)ctx.moveTo(w.trail[Math.max(0,w.trail.length-4)].x,w.trail[Math.max(0,w.trail.length-4)].y);
      else ctx.moveTo(w.x-w.vx*0.05,w.y-w.vy*0.05);
      ctx.lineTo(w.x,w.y);ctx.stroke();
      ctx.shadowBlur=6;ctx.strokeStyle=w.color;ctx.lineWidth=w.size;
      ctx.beginPath();if(w.trail.length>1)ctx.moveTo(w.trail[Math.max(0,w.trail.length-4)].x,w.trail[Math.max(0,w.trail.length-4)].y);else ctx.moveTo(w.x-w.vx*0.05,w.y-w.vy*0.05);ctx.lineTo(w.x,w.y);ctx.stroke();
    } else if(w.shape==='rocket'){
      // Rocket: large projectile with flame
      ctx.shadowColor='#ff6d00';ctx.shadowBlur=15;
      // Flame tail
      ctx.fillStyle='#ff9800';ctx.beginPath();ctx.arc(w.x-Math.cos(w.angle)*6,w.y-Math.sin(w.angle)*6,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(w.x-Math.cos(w.angle)*9,w.y-Math.sin(w.angle)*9,3,0,Math.PI*2);ctx.fill();
      // Body
      const rg=ctx.createRadialGradient(w.x,w.y,2,w.x,w.y,w.size);
      rg.addColorStop(0,'#fff');rg.addColorStop(0.5,'#ff9800');rg.addColorStop(1,'#bf360c');
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(w.x,w.y,w.size,0,Math.PI*2);ctx.fill();
    } else if(w.shape==='spike'){
      // Rifle: long thin spike bullet
      ctx.shadowColor=w.color;ctx.shadowBlur=8;
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(w.x-Math.cos(w.angle)*w.size*2,w.y-Math.sin(w.angle)*w.size*2);
      ctx.lineTo(w.x+Math.cos(w.angle)*w.size,w.y+Math.sin(w.angle)*w.size);ctx.stroke();
      ctx.strokeStyle=w.color;ctx.lineWidth=w.size*0.8;
      ctx.beginPath();ctx.moveTo(w.x-Math.cos(w.angle)*w.size,w.y-Math.sin(w.angle)*w.size);
      ctx.lineTo(w.x+Math.cos(w.angle)*w.size*0.8,w.y+Math.sin(w.angle)*w.size*0.8);ctx.stroke();
    } else if(w.shape==='pellet'){
      // Shotgun: small red pellets
      ctx.shadowColor=w.color;ctx.shadowBlur=4;
      ctx.fillStyle='#ffcdd2';ctx.beginPath();ctx.arc(w.x,w.y,w.size*0.8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=w.color;ctx.beginPath();ctx.arc(w.x,w.y,w.size*0.5,0,Math.PI*2);ctx.fill();
    } else {
      // Default round bullet (pistol/SMG)
      ctx.shadowColor=w.color;ctx.shadowBlur=6;
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(w.x,w.y,w.size,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=w.color;ctx.beginPath();ctx.arc(w.x,w.y,w.size*0.6,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
  get outOfBounds(){ return this.x<-80||this.x>W+80||this.y<-80||this.y>H+80||this.life<=0; }
}
class Explosion {
  constructor(x,y,radius,damage){ this.x=x;this.y=y;this.radius=radius;this.damage=damage;this.maxRadius=radius;this.currentRadius=0;this.life=0.35;this.maxLife=0.35;this.damaged=new Set(); }
  update(dt){ this.currentRadius=this.maxRadius*(1-this.life/this.maxLife);this.life-=dt; }
  draw(ctx){ const a=Math.max(0,this.life/this.maxLife);ctx.save();ctx.globalAlpha=a*0.6;const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.currentRadius);g.addColorStop(0,'rgba(255,255,200,0.9)');g.addColorStop(0.3,'rgba(255,150,0,0.7)');g.addColorStop(0.7,'rgba(255,50,0,0.3)');g.addColorStop(1,'rgba(255,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.currentRadius,0,Math.PI*2);ctx.fill();ctx.restore(); }
  get dead(){ return this.life<=0; }
}

// ==================== ENEMY ====================
class Enemy {
  constructor(x,y,type,wave){ this.x=x;this.y=y; const types={ normal:{r:16,s:70,hp:25,g:5,dmg:10,colors:['#e53935','#ef5350']}, fast:{r:12,s:150,hp:15,g:3,dmg:5,colors:['#ab47bc','#ce93d8']}, tank:{r:24,s:45,hp:70,g:15,dmg:18,colors:['#43a047','#66bb6a']}, boss:{r:38,s:30,hp:250,g:80,dmg:30,colors:['#ff6f00','#ffa726']}, shooter:{r:18,s:50,hp:30,g:12,dmg:8,colors:['#00acc1','#4dd0e1']}, }; const t=types[type];this.type=type;this.radius=t.r;this.speed=t.s+wave*3;this.maxHp=t.hp+wave*(type==='boss'?40:type==='tank'?15:5);this.hp=this.maxHp;this.gold=t.g+wave;this.damage=t.dmg+wave;this.c1=t.colors[0];this.c2=t.colors[1];this.hitFlash=0;if(type==='shooter'){this.shootTimer=2+Math.random();this.shootInterval=2;} }
  update(dt,player){ const dx=player.x-this.x,dy=player.y-this.y,dist=Math.sqrt(dx*dx+dy*dy)||1; if(this.type==='shooter'){ if(dist>250){this.x+=(dx/dist)*this.speed*dt;this.y+=(dy/dist)*this.speed*dt;} this.shootTimer-=dt;if(this.shootTimer<=0){this.shootTimer=this.shootInterval;const a=Math.atan2(dy,dx);enemyBullets.push(new Bullet(this.x,this.y,a,{bulletSpeed:250,damage:8,color:'#00e5ff',size:3,pierce:0,explosive:false,explRadius:0,explDmg:0}));enemyBullets[enemyBullets.length-1].isEnemy=true;} } else { this.x+=(dx/dist)*this.speed*dt;this.y+=(dy/dist)*this.speed*dt; } this.hitFlash=Math.max(0,this.hitFlash-dt); }
  draw(ctx){ ctx.save();if(this.hitFlash>0){ctx.shadowColor='#fff';ctx.shadowBlur=10;} const g=ctx.createRadialGradient(this.x,this.y,this.radius*0.3,this.x,this.y,this.radius);g.addColorStop(0,this.c2);g.addColorStop(1,this.c1);ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#fff';const eo=this.radius*0.35;ctx.beginPath();ctx.arc(this.x-eo,this.y-eo*0.5,this.radius*0.22,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(this.x+eo,this.y-eo*0.5,this.radius*0.22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(this.x-eo,this.y-eo*0.5,this.radius*0.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(this.x+eo,this.y-eo*0.5,this.radius*0.1,0,Math.PI*2);ctx.fill();if(this.hp<this.maxHp){const bw=this.radius*2,bh=3,by=this.y-this.radius-8;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(this.x-bw/2,by,bw,bh);const r=this.hp/this.maxHp;ctx.fillStyle=r>0.5?'#4caf50':r>0.25?'#ff9800':'#f44336';ctx.fillRect(this.x-bw/2,by,bw*r,bh);}ctx.restore();if(this.type==='shooter'){ctx.save();ctx.strokeStyle='rgba(0,229,255,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(this.x,this.y,this.radius+8,0,Math.PI*2);ctx.stroke();ctx.restore();} }
  get dead(){ return this.hp<=0; }
}

// ==================== COIN ====================
class Coin {
  constructor(x,y,value){ this.x=x;this.y=y;this.value=value;this.radius=8;this.life=10;this.bobPhase=Math.random()*Math.PI*2; }
  update(dt,player){ this.life-=dt;this.bobPhase+=dt*3;const dx=player.x-this.x,dy=player.y-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<player.magnetRange){const s=400*(1-dist/player.magnetRange);this.x+=(dx/dist)*s*dt;this.y+=(dy/dist)*s*dt;} }
  draw(ctx){ const bob=Math.sin(this.bobPhase)*3;const a=this.life<2?this.life/2:1;ctx.save();ctx.globalAlpha=a;ctx.shadowColor='#ffd700';ctx.shadowBlur=8;const g=ctx.createRadialGradient(this.x,this.y+bob,2,this.x,this.y+bob,this.radius);g.addColorStop(0,'#fff176');g.addColorStop(0.5,'#ffd700');g.addColorStop(1,'#ff8f00');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y+bob,this.radius,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',this.x,this.y+bob);ctx.restore(); }
  get dead(){ return this.life<=0; }
}

// ==================== PLAYER ====================
const player = {
  x: W/2, y: H/2, radius: 18, speed: 200,
  hp: 100, maxHp: 100, magnetRange: 120, // Increased base magnet range
  weaponIdx: 0, ownedWeapons: new Set([0]),
  cooldown: 0, invuln: 0, flashTimer: 0,
  stats: { hp:0, speed:0, magnet:0, regen:0 },
  statsMax: { hp:5, speed:4, magnet:5, regen:3 },
  statsCost: [[0,20,50,100,180],[0,25,60,120,200],[0,15,35,70,120,200],[0,40,100,200]],
  regenTimer: 0,
};

function getWeapon(){ return WEAPONS[player.weaponIdx]; }

function getStatValue(stat){
  const lv=player.stats[stat];
  switch(stat){
    case 'hp': return 100+lv*20;
    case 'speed': return 200+lv*35;
    case 'magnet': return 120+lv*45; // Bigger magnet: 120 base + 45/level
    case 'regen': return lv;
    default: return 0;
  }
}

function refreshStats(){
  player.maxHp=getStatValue('hp');
  player.hp=Math.min(player.hp,player.maxHp);
  player.speed=getStatValue('speed');
  player.magnetRange=getStatValue('magnet');
}

// ==================== GAME STATE ====================
let gold=0, kills=0, wave=1, totalGold=0, gameOver=false;
let enemiesRemaining=0, waveTotal=0, spawnTimer=0, spawnInterval=1.2;
let bullets=[], enemyBullets=[], enemies=[], coins=[], particles=[], floatingTexts=[], explosions=[];
let lastTime=0, shakeAmount=0, statsPanelOpen=false, saveTimer=0;

function spawnEnemy(){
  let type='normal';const r=Math.random();
  if(wave>=5&&r>0.9)type='shooter';else if(r<0.45)type='normal';else if(r<0.7)type='fast';else if(r<0.9)type='tank';else if(wave>=3)type='boss';
  const m=50,side=Math.floor(Math.random()*4);let x,y;
  switch(side){case 0:x=-m;y=Math.random()*H;break;case 1:x=W+m;y=Math.random()*H;break;case 2:x=Math.random()*W;y=-m;break;case 3:x=Math.random()*W;y=H+m;break;}
  enemies.push(new Enemy(x,y,type,wave));
}

function killEnemy(e){
  kills++;
  for(let i=0;i<12;i++){ const a=Math.random()*Math.PI*2,s=50+Math.random()*150;particles.push(new Particle(e.x,e.y,Math.cos(a)*s,Math.sin(a)*s,e.c1,0.5,3+Math.random()*3)); }
  coins.push(new Coin(e.x,e.y,e.gold));
  floatingTexts.push(new FloatingText(e.x,e.y-15,'+'+e.gold+'💰','#ffd700'));
  if(e.type==='boss')shakeAmount=Math.max(shakeAmount,8);
}

function takeDamage(dmg){
  if(player.invuln>0)return;
  player.hp-=dmg;player.invuln=0.4;shakeAmount=Math.max(shakeAmount,4);
  floatingTexts.push(new FloatingText(player.x,player.y-20,'-'+dmg,'#ff4444',16));
  if(player.hp<=0){player.hp=0;endGame();}
}

function endGame(){
  gameOver=true;
  try { const k=getSaveKey();if(k)localStorage.removeItem(k); } catch(e){}
  goDiv.style.display='block';
  const w=getWeapon();
  document.getElementById('goKills').textContent='🏆 击杀: '+kills;
  document.getElementById('goGold').textContent='💰 累计金币: '+totalGold;
  document.getElementById('goWave').textContent='🌊 存活波数: '+wave;
  document.getElementById('goWeapon').textContent='🔫 最终武器: '+w.name;
}

function showMsg(text){ msgBox.textContent=text;msgBox.style.opacity='1';setTimeout(()=>{msgBox.style.opacity='0';},1500); }
function flashSave(){ saveInd.style.opacity='1';setTimeout(()=>{saveInd.style.opacity='0';},1500); }

// ==================== SAVE SYSTEM ====================
function getSaveKey(){ return currentUser ? AUTH_PREFIX+currentUser : null; }

function saveGame(){
  if(!currentUser) return;
  const save = {
    weaponIdx: player.weaponIdx,
    ownedWeapons: [...player.ownedWeapons],
    stats: {...player.stats},
    gold, kills, wave, totalGold,
    time: Date.now()
  };
  try { localStorage.setItem(getSaveKey(), JSON.stringify(save)); } catch(e){}
}

function loadGame(){
  if(!currentUser) return false;
  try {
    const raw = localStorage.getItem(getSaveKey());
    if(!raw) return false;
    const save = JSON.parse(raw);
    player.weaponIdx = save.weaponIdx||0;
    player.ownedWeapons = new Set(save.ownedWeapons||[0]);
    Object.assign(player.stats, save.stats||{});
    gold = save.gold||0;
    kills = save.kills||0;
    wave = save.wave||1;
    totalGold = save.totalGold||0;
    refreshStats();
    player.hp = player.maxHp;
    return true;
  } catch(e){ return false; }
}

function hasSave(){
  if(!currentUser) return false;
  try { return !!localStorage.getItem(getSaveKey()); } catch(e){ return false; }
}

// ==================== UPGRADE ====================
function equipWeapon(idx){
  if(!player.ownedWeapons.has(idx)) return;
  player.weaponIdx=idx;
  renderBottomBar();
  updateUI();
  saveGame();
  flashSave();
  showMsg('🔫 切换为 '+WEAPONS[idx].name);
}

function buyWeapon(idx){
  if(player.ownedWeapons.has(idx)){
    equipWeapon(idx); // Click owned = re-equip
    return;
  }
  const w=WEAPONS[idx];
  if(gold<w.cost) return;
  gold-=w.cost;
  player.ownedWeapons.add(idx);
  player.weaponIdx=idx; // Auto-equip after buying!
  renderBottomBar();
  updateUI();
  saveGame();
  flashSave();
  showMsg('🔫 购买 '+w.name+'！已装备');
}

function buyStat(stat){
  const lv=player.stats[stat];
  const max=player.statsMax[stat];
  if(lv>=max) return;
  const cost=player.statsCost[['hp','speed','magnet','regen'].indexOf(stat)][lv];
  if(gold<cost) return;
  gold-=cost;
  player.stats[stat]++;
  refreshStats();
  renderBottomBar();
  updateUI();
  saveGame();
  flashSave();
  const names={hp:'生命上限',speed:'移动速度',magnet:'磁铁',regen:'生命回复'};
  const vals={hp:player.maxHp,speed:player.speed,magnet:player.magnetRange,regen:getStatValue('regen')};
  showMsg(`⬆ ${names[stat]} Lv.${player.stats[stat]} (${vals[stat]})`);
}

function renderBottomBar(){
  let html='';
  for(let i=0;i<WEAPONS.length;i++){
    const owned=player.ownedWeapons.has(i);
    const equipped=i===player.weaponIdx;
    const canBuy=!owned && i===Math.max(...player.ownedWeapons)+1; // Only next tier available
    let cls='upgrade-btn';
    let costText='';
    if(equipped){ cls+=' equipped'; costText='⚡装备中'; }
    else if(owned){ cls+=' owned'; costText='点击装备'; }
    else if(canBuy){ costText='💰'+WEAPONS[i].cost; if(gold>=WEAPONS[i].cost)cls+=' affordable'; }
    else { costText='🔒'; }
    html+=`<div class="${cls}" data-action="buyWeapon" data-idx="${i}" title="${WEAPONS[i].desc}">
      <span class="icon">${WEAPONS[i].icon}</span>
      <span class="name">${WEAPONS[i].name}</span>
      <span class="cost">${costText}</span>
    </div>`;
  }
  // Quick stat upgrades
  const statIcons={hp:'❤️',speed:'👟',magnet:'🧲'};
  const statKeys=['hp','speed','magnet'];
  for(const s of statKeys){
    const lv=player.stats[s],max=player.statsMax[s];
    if(lv>=max)continue;
    const cost=player.statsCost[statKeys.indexOf(s)][lv];
    html+=`<div class="upgrade-btn${gold>=cost?' affordable':''}" data-action="buyStat" data-stat="${s}">
      <span class="icon">${statIcons[s]}</span><span class="name">Lv${lv+1}</span><span class="cost">💰${cost}</span></div>`;
  }
  html+=`<div class="upgrade-btn affordable" data-action="toggleStats" style="background:rgba(79,195,247,0.15);border-color:#4fc3f7;color:#4fc3f7;">
    <span class="icon">📋</span><span class="name">更多</span><span class="cost">按U</span></div>`;
  bottomBar.innerHTML=html;
}

function toggleStatsPanel(){ statsPanelOpen=!statsPanelOpen;updateUI(); }

// Event delegation
bottomBar.addEventListener('click', function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const a=btn.dataset.action;
  if(a==='buyWeapon')buyWeapon(parseInt(btn.dataset.idx));
  else if(a==='buyStat')buyStat(btn.dataset.stat);
  else if(a==='toggleStats')toggleStatsPanel();
});
document.addEventListener('click', function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn||btn.closest('#bottomBar'))return;
  if(btn.dataset.action==='buyStat')buyStat(btn.dataset.stat);
});

function updateUI(){
  const w=getWeapon();
  topBar.innerHTML=`<span class="stat">❤️ ${Math.ceil(player.hp)}/${player.maxHp}</span><span class="stat gold-text">💰 ${gold}</span><span class="stat">🌊 第${wave}波</span><span class="stat">💀 ${kills}</span><span class="stat">${w.icon} ${w.name}</span>`;
  if(statsPanelOpen){
    topBar.innerHTML+=`<div style="position:absolute;top:40px;left:8px;right:8px;background:rgba(10,10,30,0.95);border:1px solid #4fc3f7;border-radius:8px;padding:10px;display:flex;flex-wrap:wrap;gap:6px;pointer-events:auto;">
      ${['hp','speed','magnet','regen'].map(s=>{
        const lv=player.stats[s],max=player.statsMax[s];
        const names={hp:'生命',speed:'速度',magnet:'磁铁',regen:'回复'};
        const vals={hp:player.maxHp,speed:player.speed,magnet:player.magnetRange,regen:getStatValue('regen')};
        const cost=lv<max?player.statsCost[['hp','speed','magnet','regen'].indexOf(s)][lv]:0;
        const canBuy=gold>=cost&&lv<max;
        return `<div class="upgrade-btn${lv>=max?' owned':canBuy?' affordable':''}" data-action="buyStat" data-stat="${s}" style="pointer-events:auto;">
          <span>${names[s]}</span><br><span style="font-size:10px">Lv${lv}/${max}=${vals[s]}</span><br>
          <span style="font-size:10px">${lv>=max?'MAX':'💰'+cost}</span></div>`;
      }).join('')}
    </div>`;
  }
}

function startWave(){
  waveTotal=5+wave*4;
  enemiesRemaining=waveTotal;
  spawnInterval=Math.max(0.25,1.2-wave*0.06);
  spawnTimer=0;
  showMsg('🌊 第 '+wave+' 波');
  updateUI();
}

function restartGame(){
  try { const k=getSaveKey();if(k)localStorage.removeItem(k); } catch(e){}
  player.x=W/2;player.y=H/2;player.weaponIdx=0;player.ownedWeapons=new Set([0]);
  player.stats={hp:0,speed:0,magnet:0,regen:0};
  refreshStats();player.hp=player.maxHp;player.cooldown=0;player.invuln=0;player.flashTimer=0;player.regenTimer=0;
  gold=0;kills=0;wave=1;totalGold=0;
  bullets=[];enemyBullets=[];enemies=[];coins=[];particles=[];floatingTexts=[];explosions=[];
  gameOver=false;shakeAmount=0;statsPanelOpen=false;
  goDiv.style.display='none';
  startWave();renderBottomBar();updateUI();
}

function loadOrStart(){
  if(loadGame()){
    startWave();
    showMsg('📂 进度已恢复');
  } else {
    startWave();
  }
  renderBottomBar();
  updateUI();
  requestAnimationFrame(gameLoop);
}

function logout(){
  saveGame();
  currentUser=null;
  localStorage.removeItem('shooting_last_user');
  gameOver=true;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('logoutBtn').style.display='none';
  goDiv.style.display='none';
}

// ==================== GAME LOOP ====================
function update(dt){
  if(!currentUser||gameOver)return;
  dt=Math.min(dt,0.1);

  // Movement
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])dy-=1;
  if(keys['s']||keys['arrowdown'])dy+=1;
  if(keys['a']||keys['arrowleft'])dx-=1;
  if(keys['d']||keys['arrowright'])dx+=1;
  if(isMobile&&mobileMove.active){ const mdx=mobileMove.x-player.x,mdy=mobileMove.y-player.y,mlen=Math.sqrt(mdx*mdx+mdy*mdy);if(mlen>15){dx=mdx/mlen;dy=mdy/mlen;} }
  if(dx!==0||dy!==0){const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;}
  player.x+=dx*player.speed*dt;player.y+=dy*player.speed*dt;
  player.x=Math.max(player.radius,Math.min(W-player.radius,player.x));
  player.y=Math.max(player.radius,Math.min(H-player.radius,player.y));
  player.invuln=Math.max(0,player.invuln-dt);player.flashTimer+=dt;

  if(player.stats.regen>0){ player.regenTimer-=dt;if(player.regenTimer<=0){player.regenTimer=3;player.hp=Math.min(player.maxHp,player.hp+player.stats.regen);} }

  // Shooting
  let aimX,aimY,shooting;
  if(isMobile){ shooting=mobileShoot.active;aimX=mobileShoot.x;aimY=mobileShoot.y; }
  else { shooting=mouse.down;aimX=mouse.x;aimY=mouse.y; }
  const angle=Math.atan2(aimY-player.y,aimX-player.x);
  const w=getWeapon();
  if(shooting){ player.cooldown-=dt;
    while(player.cooldown<=0){ player.cooldown+=1/w.fireRate;
      for(let i=0;i<w.bullets;i++){ const a=angle+(i-(w.bullets-1)/2)*w.spread;
        bullets.push(new Bullet(player.x+Math.cos(a)*player.radius,player.y+Math.sin(a)*player.radius,a,
          {bulletSpeed:w.bulletSpeed,damage:w.damage,color:w.color,size:w.size,pierce:w.pierce,explosive:w.explosive,explRadius:w.explRadius,explDmg:w.explDmg,shape:w.shape,trailLen:w.trailLen,trailColor:w.trailColor})); }
      // Muzzle flash - varies by weapon
      const mfSize=w.shape==='rocket'?8:w.shape==='shotgun'?5:w.shape==='beam'?2:3;
      for(let m=0;m<w.recoil;m++){
        particles.push(new Particle(player.x+Math.cos(angle)*player.radius,player.y+Math.sin(angle)*player.radius,
          Math.cos(angle)*(60+Math.random()*80),Math.sin(angle)*(60+Math.random()*80),w.muzzle||w.color,0.08+Math.random()*0.1,mfSize+Math.random()*2));
      }
    }
  } else player.cooldown=Math.max(0,player.cooldown-dt);

  // Spawn
  if(enemiesRemaining>0){spawnTimer-=dt;if(spawnTimer<=0){spawnEnemy();enemiesRemaining--;spawnTimer=spawnInterval;}}
  else if(enemies.length===0&&enemiesRemaining===0){wave++;player.hp=Math.min(player.maxHp,player.hp+20);startWave();}

  // Update all
  for(const b of bullets)b.update(dt);for(const b of enemyBullets)b.update(dt);
  for(const e of enemies)e.update(dt,player);for(const c of coins)c.update(dt,player);
  for(const p of particles)p.update(dt);for(const t of floatingTexts)t.update(dt);
  for(const ex of explosions)ex.update(dt);

  // Bullets vs enemies
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i];
    for(let j=enemies.length-1;j>=0;j--){ const e=enemies[j];
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.radius+b.size+2){ e.hp-=b.damage;e.hitFlash=0.1;
        for(let k=0;k<3;k++)particles.push(new Particle(b.x,b.y,(Math.random()-0.5)*80,(Math.random()-0.5)*80,'#ffeb3b',0.2,2));
        if(b.explosive){explosions.push(new Explosion(b.x,b.y,b.explRadius,b.explDmg));shakeAmount=Math.max(shakeAmount,5);}
        if(e.hp<=0){killEnemy(e);enemies.splice(j,1);} if(!b.pierce){bullets.splice(i,1);break;}
      }
    }
  }
  // Explosions vs enemies
  for(const ex of explosions){ for(let j=enemies.length-1;j>=0;j--){ const e=enemies[j];if(ex.damaged.has(j))continue;
      if(Math.hypot(ex.x-e.x,ex.y-e.y)<e.radius+ex.currentRadius){ex.damaged.add(j);e.hp-=ex.damage;e.hitFlash=0.1;if(e.hp<=0){killEnemy(e);enemies.splice(j,1);}}
  }}
  // Enemy bullets vs player
  for(let i=enemyBullets.length-1;i>=0;i--){ const b=enemyBullets[i];if(Math.hypot(b.x-player.x,b.y-player.y)<player.radius+b.size+2){takeDamage(b.damage);enemyBullets.splice(i,1);} }
  // Enemies vs player
  for(const e of enemies){ if(Math.hypot(player.x-e.x,player.y-e.y)<player.radius+e.radius){takeDamage(e.damage);const a=Math.atan2(e.y-player.y,e.x-player.x);e.x+=Math.cos(a)*30;e.y+=Math.sin(a)*30;} }
  // Collect coins
  for(let i=coins.length-1;i>=0;i--){ const c=coins[i];if(Math.hypot(player.x-c.x,player.y-c.y)<player.radius+c.radius+5){gold+=c.value;totalGold+=c.value;coins.splice(i,1);} }

  bullets=bullets.filter(b=>!b.outOfBounds);enemyBullets=enemyBullets.filter(b=>!b.outOfBounds);
  coins=coins.filter(c=>!c.dead);particles=particles.filter(p=>!p.dead);
  floatingTexts=floatingTexts.filter(t=>!t.dead);explosions=explosions.filter(ex=>!ex.dead);

  shakeAmount*=0.88;if(shakeAmount<0.05)shakeAmount=0;

  saveTimer-=dt;
  if(saveTimer<=0){saveTimer=5;saveGame();flashSave();}

  updateUI();
  renderBottomBar();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();if(shakeAmount>0)ctx.translate((Math.random()-0.5)*shakeAmount*2,(Math.random()-0.5)*shakeAmount*2);
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(const p of particles)p.draw(ctx);for(const ex of explosions)ex.draw(ctx);
  for(const c of coins)c.draw(ctx);for(const e of enemies)e.draw(ctx);
  for(const b of bullets)b.draw(ctx);for(const b of enemyBullets)b.draw(ctx);

  // Player
  ctx.save();if(player.invuln>0&&Math.sin(player.flashTimer*20)>0)ctx.globalAlpha=0.4;
  ctx.shadowColor='#4fc3f7';ctx.shadowBlur=15;
  const pg=ctx.createRadialGradient(player.x,player.y,player.radius*0.3,player.x,player.y,player.radius);
  pg.addColorStop(0,'#4fc3f7');pg.addColorStop(1,'#0288d1');
  ctx.fillStyle=pg;ctx.beginPath();ctx.arc(player.x,player.y,player.radius,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.stroke();
  const ang=Math.atan2(isMobile&&mobileShoot.active?mobileShoot.y-player.y:mouse.y-player.y,isMobile&&mobileShoot.active?mobileShoot.x-player.x:mouse.x-player.x);
  const wdata=getWeapon();
  // Gun barrel - reflects current weapon
  const barrelBase=player.radius*0.3;const barrelTip=player.radius+wdata.barrelLen;
  const tip={x:player.x+Math.cos(ang)*barrelTip,y:player.y+Math.sin(ang)*barrelTip};
  ctx.strokeStyle=wdata.color;ctx.lineWidth=wdata.barrelW;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(player.x+Math.cos(ang)*barrelBase,player.y+Math.sin(ang)*barrelBase);ctx.lineTo(tip.x,tip.y);ctx.stroke();
  // Barrel outline
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=wdata.barrelW*0.3;
  ctx.beginPath();ctx.moveTo(player.x+Math.cos(ang)*barrelBase,player.y+Math.sin(ang)*barrelBase);ctx.lineTo(tip.x,tip.y);ctx.stroke();
  // Muzzle tip
  const muzzleColor=wdata.muzzle||wdata.color;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(tip.x,tip.y,wdata.barrelW*0.7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=muzzleColor;ctx.beginPath();ctx.arc(tip.x,tip.y,wdata.barrelW*0.45,0,Math.PI*2);ctx.fill();
  ctx.restore();

  for(const t of floatingTexts)t.draw(ctx);

  if(!isMobile){ ctx.save();ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;const c=10;
    ctx.beginPath();ctx.moveTo(mouse.x-c,mouse.y);ctx.lineTo(mouse.x-3,mouse.y);ctx.stroke();ctx.beginPath();ctx.moveTo(mouse.x+3,mouse.y);ctx.lineTo(mouse.x+c,mouse.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouse.x,mouse.y-c);ctx.lineTo(mouse.x,mouse.y-3);ctx.stroke();ctx.beginPath();ctx.moveTo(mouse.x,mouse.y+3);ctx.lineTo(mouse.x,mouse.y+c);ctx.stroke();ctx.restore(); }

  // Mobile indicators
  if(isMobile){ ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(0,0,W/2,H);ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.setLineDash([6,10]);
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    if(mobileMove.active){ ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(mobileMove.x,mobileMove.y,40,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(mobileMove.x,mobileMove.y,40,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(mobileMove.x,mobileMove.y,14,0,Math.PI*2);ctx.fill(); }
    ctx.fillStyle='rgba(255,50,50,0.04)';ctx.fillRect(W/2,0,W/2,H);
    if(mobileShoot.active){ const sa=Math.atan2(mobileShoot.y-player.y,mobileShoot.x-player.x);ctx.strokeStyle='rgba(255,100,100,0.5)';ctx.lineWidth=2;ctx.setLineDash([3,5]);ctx.beginPath();ctx.moveTo(player.x+Math.cos(sa)*player.radius,player.y+Math.sin(sa)*player.radius);ctx.lineTo(mobileShoot.x,mobileShoot.y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(255,100,100,0.5)';ctx.beginPath();ctx.arc(mobileShoot.x,mobileShoot.y,8,0,Math.PI*2);ctx.fill(); }
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='11px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
    ctx.fillText('移动',W*0.25,H*0.42);ctx.fillText('射击',W*0.75,H*0.42);ctx.restore(); }

  ctx.restore();

  // Magnet range (always visible, brighter)
  ctx.save();
  const magAlpha = 0.15 + player.stats.magnet * 0.03;
  ctx.strokeStyle=`rgba(255,215,0,${magAlpha})`;ctx.setLineDash([5,15]);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(player.x,player.y,player.magnetRange,0,Math.PI*2);ctx.stroke();
  // Inner circle for magnet
  if(player.stats.magnet>=2){ ctx.fillStyle=`rgba(255,215,0,${magAlpha*0.5})`;ctx.beginPath();ctx.arc(player.x,player.y,player.magnetRange,0,Math.PI*2);ctx.fill(); }
  ctx.restore();
}

function gameLoop(ts){ if(!lastTime)lastTime=ts;const dt=(ts-lastTime)/1000;lastTime=ts;update(dt);draw();requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
